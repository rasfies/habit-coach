# Supabase local development configuration
# Full reference: https://supabase.com/docs/reference/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://localhost:3000",
  "exp://localhost:8081",          # Expo dev client
  "habitcoach://auth/callback",    # Expo deep link
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false     # disabled for local dev

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = ""                # auto-generated by Supabase

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"

# ─── Edge Functions ───────────────────────────────────────────────────────────

[functions.daily-coach]
# Generates tomorrow's coaching messages for all active users.
# Called via pg_cron at 23:00 UTC daily so messages are ready at start of day.
verify_jwt = true

[functions.streak-audit]
# Recalculates streaks for all users, resets grace days on Mondays.
# Called via pg_cron at 00:05 UTC daily (just after midnight).
# Does not require JWT — invoked internally by pg_cron with service key.
verify_jwt = false

# ─── Cron Schedules (pg_cron) ────────────────────────────────────────────────
# After deploying functions, register schedules in Supabase SQL editor:
#
#   -- Run streak-audit at 00:05 UTC every day
#   SELECT cron.schedule(
#     'streak-audit-daily',
#     '5 0 * * *',
#     $$SELECT net.http_post(
#       url := current_setting('app.supabase_url') || '/functions/v1/streak-audit',
#       headers := jsonb_build_object(
#         'Content-Type', 'application/json',
#         'Authorization', 'Bearer ' || current_setting('app.service_role_key')
#       ),
#       body := '{}'::jsonb
#     )$$
#   );
#
#   -- Run daily-coach at 23:00 UTC every day (generate next day's messages)
#   SELECT cron.schedule(
#     'daily-coach-messages',
#     '0 23 * * *',
#     $$SELECT net.http_post(
#       url := current_setting('app.supabase_url') || '/functions/v1/daily-coach',
#       headers := jsonb_build_object(
#         'Content-Type', 'application/json',
#         'Authorization', 'Bearer ' || current_setting('app.service_role_key')
#       ),
#       body := '{}'::jsonb
#     )$$
#   );
